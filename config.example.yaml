## SeeseoCrawler configuration

# Crawler settings
crawler:
  # Number of concurrent fetch workers
  workers: 10
  # Default delay between requests to the same host
  delay: 1s
  # Maximum number of pages to crawl (0 = unlimited)
  max_pages: 0
  # Maximum crawl depth (0 = unlimited)
  max_depth: 0
  # Request timeout
  timeout: 30s
  # User-Agent string
  user_agent: "SeeseoCrawler/1.0"
  # Maximum response body size
  max_body_size: 10485760  # 10MB
  # Respect robots.txt
  respect_robots: true
  # Store raw HTML body in ClickHouse (ZSTD compressed)
  store_html: false

# ClickHouse connection
clickhouse:
  host: localhost
  port: 19000
  database: crawlobserver
  username: default
  password: ""

# Storage buffer settings
storage:
  # Flush buffer after this many rows
  batch_size: 1000
  # Flush buffer after this duration
  flush_interval: 5s

# Resource limits
resources:
  # Memory soft limit in MB (0 = auto, based on CPU count)
  max_memory_mb: 0
  # Max CPU cores / GOMAXPROCS (0 = all available)
  max_cpu: 0

# Web server settings
server:
  host: 127.0.0.1
  port: 8899
  # Basic auth credentials (CHANGE THESE before exposing to the internet)
  username: admin
  password: crawlobserver

# Theme / branding
theme:
  # Application name shown in sidebar
  app_name: SeeseoCrawler
  # Logo URL (leave empty for default icon)
  logo_url: ""
  # Primary accent color (hex)
  accent_color: "#7c3aed"
  # Color mode: "light", "dark" or "auto" (follow OS preference)
  mode: dark
